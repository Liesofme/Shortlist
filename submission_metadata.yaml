# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini (Antigravity agent)"

ai_usage_summary: |
  Used Gemini Antigravity agent for architecture discussion, code generation,
  and iterative development of the scoring pipeline. All scoring logic was
  designed from first principles based on the JD requirements and data
  exploration. No candidate data was sent to any external LLM API during
  ranking. Agent-generated code was reviewed and iterated with human judgment.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Deterministic rule-based ranker with explicit reasoning capture. Three-stage
  pipeline: (1) coarse filter removes irrelevant titles and honeypots,
  (2) weighted composite score from six components (career relevance 38%,
  skills alignment 22%, keyword coverage 16%, experience fit 12%, education 7%,
  location 5%), (3) multiplicative behavioral availability modifier (0.35-1.35x)
  based on platform activity signals. Career component is decisive against
  keyword-stuffer traps — title relevance and production evidence in career
  descriptions outweigh raw skill-list matching. Consulting penalty is
  recency-weighted. Honeypot detection uses conservative timeline-consistency
  checks. Runtime is ~30 seconds for 100K candidates on CPU.

